// alwj0 autoexec | Counter-Strike 2

// Set temporary generic console output color to green.
log_color "Console" "7AFF8EFF"

// Displaying start message.
echo |        _          _  ___                                                         |
echo |       | |        (_)/ _ \                                                        |
echo |   __ _| |_      ___| | | |                                                       |
echo |  / _` | \ \ /\ / / | | | |                                                       |
echo | | (_| | |\ V  V /| | |_| |                                                       |
echo |  \__,_|_| \_/\_/ | |\___/                                                        |
echo |                 _/ |                                                             |
echo |                |__/                                                              |
echo |     /\        | |                                                                |
echo |    /  \  _   _| |_ ___   _____  _____  ___                                       |
echo |   / /\ \| | | | __/ _ \ / _ \ \/ / _ \/ __|                                      |
echo |  / ____ \ |_| | || (_) |  __/>  <  __/ (__                                       |
echo | /_/    \_\__,_|\__\___/ \___/_/\_\___|\___|                                      |
echo |                                                                                  |

// Executing each configuration file.
exec "alwj0\audio.cfg"
exec "alwj0\bind.cfg"
exec "alwj0\crosshair.cfg"
exec "alwj0\hud.cfg"
exec "alwj0\mouse.cfg"
// network.cfg pins CS2's DEFAULT networking every launch (so a value saved in
// the profile can't leave the net in a weird state). To tune for high ping,
// bump cl_net_buffer_ticks inside network.cfg.
exec "alwj0\network.cfg"
exec "alwj0\performance.cfg"
exec "alwj0\script.cfg"
exec "alwj0\video.cfg"

// Reverting the changed color.
log_color "Console" "00000000"

// Write all the settings into config.cfg file, the main configuration file of the game.
host_writeconfig

// Play a sound when the entire process is done.
play "ui/beepclear"
