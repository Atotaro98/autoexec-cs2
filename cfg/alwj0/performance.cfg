// Only valid CS2 (Source 2) cvars. Many CS:GO performance commands were
// removed by Valve and now throw "Unknown command" in console.
//
// REMOVED IN CS2 (do NOT re-add - they error on launch):
//   m_rawinput            -> raw input is always-on / mandatory in CS2.
//   cl_cmdrate            -> tickrate is fixed (64-tick + subtick).
//   cl_updaterate         -> idem.
//   cl_interp             -> interpolation handled internally; see network.cfg.
//   cl_interp_ratio       -> idem (use cl_net_buffer_ticks instead).
//   cl_bob_lower_amt      -> weapon bob is no longer adjustable.
//   cl_bobamt_lat         -> idem.
//   cl_bobamt_vert        -> idem.
//   net_graph             -> replaced by the cl_hud_telemetry_* family (see hud.cfg).
//   r_dynamic / mat_queue_mode -> Source 1 leftovers, no-op/removed in Source 2.
//
// NOTE: NVIDIA Reflex is a Video settings menu option in CS2, not a reliable
// console cvar - set it there. engine_low_latency_sleep_after_client_tick
// (the useful low-latency tweak) already lives in video.cfg.

