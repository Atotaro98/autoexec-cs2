// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// |P|e|r|f|o|r|m|a|n|c|e| & |O|p|t|i|m|i|z|a|t|i|o|n| S|e|t|t|i|n|g|s| - |H|I|G|H| |P|I|N|G|
// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// Professional CS2 optimization settings optimized for HIGH PING (120ms+)
// Use this config when playing with high latency connections

// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// |M|o|u|s|e| R|a|w| I|n|p|u|t|
// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// Enable raw mouse input for lower latency and more consistent mouse movement.
// Default: 1
//
// >> Raw input bypasses Windows mouse acceleration and provides direct input to the game.
// <i> Essential for competitive play - used by all professional players.
m_rawinput "1"

// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// |W|e|a|p|o|n| B|o|b| (|M|o|v|e|m|e|n|t|)|
// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// Amount the viewmodel lowers when aiming down.
// Default: 21
//
// >> Reduces weapon movement when aiming to improve visibility.
cl_bob_lower_amt "21"

// Weapon movement amount (horizontal).
// Default: 0.33
//
// >> Controls horizontal weapon sway when moving.
cl_bobamt_lat "0.33"

// Weapon movement amount (vertical).
// Default: 0.14
//
// >> Controls vertical weapon sway when moving.
cl_bobamt_vert "0.14"

// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// |N|e|t|w|o|r|k| R|a|t|e|s| - |H|I|G|H| |P|I|N|G| O|p|t|i|m|i|z|e|d|
// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// Maximum number of command packets sent to server per second.
// Default: 64
//
// >> Set to 64 for matchmaking (64-tick) or 128 for 128-tick servers (Faceit, ESEA, etc.).
// <i> For HIGH PING (120ms+), 64 is more stable than 128 even on 128-tick servers.
// <!> HIGH PING OPTIMIZATION: Using 64 reduces packet overhead and improves stability.
cl_cmdrate "64"

// Maximum number of packets per second the server will send.
// Default: 64
//
// >> Set to 64 for matchmaking (64-tick) or 128 for 128-tick servers.
// <i> Should match cl_cmdrate.
// <!> HIGH PING OPTIMIZATION: Using 64 reduces packet overhead and improves stability.
cl_updaterate "64"

// Interpolation ratio.
// Default: 2
//
// >> Lower values = less interpolation = more responsive but can cause stuttering.
// <i> Professional players typically use 1 for stable connections with LOW PING.
// <!> HIGH PING OPTIMIZATION: Using 2 reduces stuttering and smooths out gameplay.
// <!> This is controlled by cl_net_buffer_ticks, but setting it explicitly ensures consistency.
cl_interp_ratio "2"

// Interpolation amount.
// Default: 0.015625
//
// >> Should be calculated as: cl_interp_ratio / cl_updaterate
// <i> For 128 tick: 1/128 = 0.0078125, 2/128 = 0.015625
// <i> For 64 tick: 1/64 = 0.015625, 2/64 = 0.03125
// <!> HIGH PING OPTIMIZATION: Higher interpolation (0.03125 for 64-tick) helps smooth out gameplay.
// <!> Usually auto-calculated, but setting explicitly ensures optimal values.
cl_interp "0.03125"

// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// |R|e|n|d|e|r|i|n|g| O|p|t|i|m|i|z|a|t|i|o|n|
// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// Dynamic lighting.
// Default: 1
//
// >> Disabling can improve FPS but reduces visual quality.
// <i> Professional players often disable for maximum FPS.
r_dynamic "0"

// Material system queue mode (multithreading).
// Default: -1
//
// >> Controls how materials are processed across CPU cores.
// <> Values:
// -1: Default (auto-detect)
//  0: Synchronous single-threaded
//  1: Queued single-threaded
//  2: Queued multithreaded
//
// <i> Professional players use mode 2 for maximum performance on multi-core CPUs.
mat_queue_mode "2"

// NVIDIA Reflex Low Latency.
// Default: 0
//
// >> Reduces input latency when using NVIDIA GPUs.
// <> Values:
// 0: Disabled
// 1: Enabled
// 2: Enabled + Boost (forces GPU to run at higher clocks)
//
// <i> Professional players typically disable this as it can cause input lag in some cases.
// <!> Only works with NVIDIA GPUs.
r_low_latency "0"

// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// |V|i|e|w|m|o|d|e|l| A|d|j|u|s|t|m|e|n|t|
// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// Professional viewmodel settings (s1mple style).
// <i> Your current viewmodel_offset_x is 1.5, professionals use 2.5 for better visibility.
// <!> Uncomment the line below if you want to use professional viewmodel settings:
// viewmodel_offset_x "2.5"

// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// |T|e|a|m| I|n|f|o|r|m|a|t|i|o|n|
// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// Show teammate equipment overhead.
// Default: 0
//
// >> Displays weapon and equipment icons above teammates.
// <i> Useful for team coordination - shows what weapons teammates have.
cl_show_team_equipment "1"

// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// |A|d|d|i|t|i|o|n|a|l| O|p|t|i|m|i|z|a|t|i|o|n|s|
// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// Disable automatic weapon pickup.
// Default: 1
//
// >> Prevents automatic weapon pickup when walking over weapons.
// <i> Gives you control over when to pick up weapons.
cl_autowepswitch "0"

// Disable help text.
// Default: 1
//
// >> Removes on-screen help messages.
// <i> Cleaner HUD for competitive play.
gameinstructor_enable "0"

// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// |P|e|r|f|o|r|m|a|n|c|e| M|o|n|i|t|o|r|i|n|g|
// +-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+-+
// Show net graph (requires net_graph 1 in console).
// Default: 0
//
// >> Displays network statistics (ping, loss, choke, etc.).
// <i> Useful for diagnosing network issues.
