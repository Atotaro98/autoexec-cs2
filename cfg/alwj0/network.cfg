// This file just pins CS2's DEFAULT networking on every launch, so a value
// that got saved into your profile can never leave the network in a weird
// state (e.g. a leftover high cl_net_buffer_ticks delaying hit feedback).
// Defaults verified against the in-game cvar list:
// https://github.com/ArmynC/ArminC-CS2-Cvars/blob/main/cvars/cvarlist.md
//
// >> Want a smoother feel at high ping (~100ms+)? Raise cl_net_buffer_ticks
//    to 1 (only try 2 if 1 isn't enough). Higher = more interpolation cushion
//    but more visual delay. At low ping, leave it at 0.

// Max receive bandwidth. 786432 (~6.2 Mbps) is the in-game menu maximum and
// the de-facto competitive standard; fine for any modern connection.
// (Engine default is 196608 - we intentionally keep the higher, standard value.)
rate "786432"

// --- Everything below is set to the CS2 DEFAULT on purpose ---

// Snapshot / usercommand buffer delay (this is what controls interpolation).
// Default: 0
cl_net_buffer_ticks "0"

// Use interpolation while buffering.
// Default: 0 (false)
cl_net_buffer_ticks_use_interp "0"

// Desired outgoing tick-packet queue length.
// Default: 0
cl_tickpacket_desired_queuelength "0"

// Predicted body-shot hit effects (blood / sound before server confirms).
// Default: 0 (false)
cl_predict_body_shot_fx "0"

// Predicted head-shot hit effects.
// Default: 0 (false)
cl_predict_head_shot_fx "0"

// Predict kill ragdolls (this one IS enabled by default).
// Default: 1 (true)
cl_predict_kill_ragdolls "1"
